# ============================================================
# DeepAgent Spring Boot Starter 完整配置示例（Properties 格式）
# ============================================================

# --- 基本设置 ---
deep-agent.enabled=true
deep-agent.language=cn
deep-agent.workspace-path=./workspace
deep-agent.system-prompt=你是一个中文智能体助手，请基于用户问题给出准确、简洁、可执行的回答。
deep-agent.max-iterations=15
deep-agent.task-loop-enabled=true
deep-agent.task-planning-enabled=false
deep-agent.restrict-to-work-dir=false
deep-agent.ensure-initialized=false

# --- AgentCard 信息 ---
deep-agent.agent-card.id=deep_agent
deep-agent.agent-card.name=DeepAgent
deep-agent.agent-card.description=Dynamic Planning Deep Agent

# --- 系统操作配置（文件读写、shell、代码执行） ---
deep-agent.sys-operation.enabled=true
deep-agent.sys-operation.id=deep_agent_sys_operation
deep-agent.sys-operation.name=deep_agent_sys_operation
deep-agent.sys-operation.work-dir=./workspace
deep-agent.sys-operation.restrict-to-sandbox=false
deep-agent.sys-operation.inject-tools=true
deep-agent.sys-operation.shell-allowlist[0]=echo
deep-agent.sys-operation.shell-allowlist[1]=ls
deep-agent.sys-operation.shell-allowlist[2]=cat
deep-agent.sys-operation.shell-allowlist[3]=curl
deep-agent.sys-operation.sandbox-root[0]=/tmp/sandbox
deep-agent.sys-operation.dangerous-patterns[0]=rm.*-rf.*/

# --- 内置 Rail 控制 ---
deep-agent.rails.skill-use-enabled=true
deep-agent.rails.sys-operation-enabled=true
deep-agent.rails.scan-annotated=true
deep-agent.rails.bean-names[0]=taskExecutionRail
deep-agent.rails.class-names[0]=com.example.plugin.CustomRail

# --- 模型配置（backend 定义服务端连接，model 定义模型参数） ---
deep-agent.backend.client_provider=openai
deep-agent.backend.api_key=${DEEPSEEK_API_KEY}
deep-agent.backend.api_base=https://api.deepseek.com
deep-agent.model.model=deepseek-v4-flash
deep-agent.model.thinking.type=disabled

# --- 自定义请求 header（写入内部 ReActAgentConfig.customHeaders） ---
deep-agent.headers.X-Tenant-Id=tenant-a
deep-agent.headers.X-Trace-Source=spring-boot

# --- DeepAgent 内部行为控制 ---
deep-agent.react-agent.enabled=true
deep-agent.react-agent.clear-llm=true
deep-agent.react-agent.prompt=你是一个中文智能体助手，请基于用户问题给出准确、简洁、可执行的回答。

# --- Skill 目录 ---
deep-agent.skill-directories[0]=./skills
deep-agent.skill-mode=auto_list

# --- Tool 注册方式 ---
deep-agent.tools.scan-annotated-beans=true
deep-agent.tools.bean-names[0]=orderTools
deep-agent.tools.class-names[0]=com.example.agent.tools.CommonTools

# --- 流式模式 ---
deep-agent.stream-modes[0]=OUTPUT

# --- 额外 Prompt 段落 ---
deep-agent.extra-prompt-sections[0].name=custom_guidance
deep-agent.extra-prompt-sections[0].priority=60
deep-agent.extra-prompt-sections[0].content.cn=请优先使用本地 skill 处理问题。

